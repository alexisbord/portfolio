projects:
  - name: "Datathon UdeM — Planificateur de repas intelligent"
    context: "Projet réalisé lors du Datathon de l'Université de Montréal en groupe de 3."
    tags: ["Python", "YOLOv11", "Streamlit", "SQLite", "API Garmin", "Computer Vision"]
    github: "https://github.com/alexisbord/UdeM_Hack"
    blocks:
      - type: text
        content: "NutriSnap permet de scanner le contenu d'un réfrigérateur pour générer instantanément des suggestions de recettes saines. Le système calcule le Nutri-Score et les apports nutritionnels (protéines, sucres, graisses) de chaque plat pour aider l'utilisateur à maintenir une alimentation équilibrée selon ses objectifs personnels."
      - type: images
        items:
          - src: "/assets/img/fridge.jpg"
            caption: "Détection d'ingrédients par YOLOv11"
          - src: "/assets/img/recipe.jpg"
            caption: "Interface de recommandation de recettes et Nutri-Score"
      - type: text
        content: "Côté technique, nous avons fine-tuné YOLOv11 sur une base de 30 ingrédients courants pour surpasser les limitations des modèles de zero-shot comme CLIP. Les données sont centralisées dans une base SQLite, permettant de croiser les apports caloriques avec les dépenses sportives récupérées via l'API Garmin."
      - type: images
        items:
          - src: "/assets/img/assistant.jpg"
            caption: "Assistant IA personnalisé pour le suivi santé"
          - src: "/assets/img/winner.jpg"
            caption: "Recommandations nutritionnelles personnalisées"
      - type: text
        content: "Le projet intègre également un chatbot agissant comme un coach de santé. En exploitant l'API OpenAI et les données physiologiques de l'utilisateur (poids, âge, activité physique), l'IA génère des programmes d'entraînement et des conseils nutritionnels sur mesure pour soutenir la motivation à long terme. Ce projet nous a permis , remporté avec le Prix de la meilleure utilisation de l'IA."
        

  - name: "IMT Nord Europe — Annotation automatique de données de pollution"
    context: "Projet de recherche académique réalisé en collaboration avec le Groupe Tera pour corréler événements urbains et qualité de l'air"
    objective: "Développer un système de vision par ordinateur sur Raspberry Pi pour détecter le trafic routier et synchroniser ces événements avec les mesures de micro-capteurs de pollution PM2.5"
    result: "Validation d'une méthodologie de fusion de données multi-sources et accueil positif des encadrants pour la pertinence de l'approche en recherche environnementale"
    context: "Projet de recherche académique réalisé en collaboration avec le Groupe Tera pour corréler événements urbains et qualité de l'air"
    tags: ["Python", "YOLOv7", "DeepSORT", "Raspberry Pi", "OpenCV", "Pandas", "API Web"]
    github: "https://github.com/eSaleh/P6_Systeme_annotation_donnees_polution.git"
    details:
      - type: text
        content: "Conception d'une architecture embarquée sur Raspberry Pi intégrant le logiciel Motion pour la capture vidéo déclenchée par le mouvement, optimisant ainsi le stockage limité"
      - type: text
        content: "Implémentation d'une chaîne de traitement IA combinant YOLOv7 pour la détection d'objets et DeepSORT pour le suivi temporel, permettant d'identifier les flux de véhicules en temps réel."
      - type: text
        content: "Développement d'un algorithme d'annotation automatique basé sur des critères cinématiques (vitesse, accélération) pour classifier les comportements des véhicules malgré les erreurs de tracking"
      - type: text
        content: "Synchronisation temporelle et fusion des flux de données vidéo annotées avec les relevés PM2.5 provenant des API Tera et CozyConnect pour l'analyse de corrélation"
    
  - name: "Micro-entreprise Eclair-CIE"
    context: "Projet entrepreneurial mené en partenariat avec un lycée et une association, visant à accompagner des élèves en bac professionnel dans la création d'une micro-entreprise."
    objective: "Permettre à des lycéens de créer et gérer une micro-entreprise réelle — catalogue, site web, production et vente — pour financer un voyage scolaire."
    result: "Micro-entreprise créée et opérationnelle, avec réalisation d'un catalogue produit, d'un site web et d'une campagne de vente réussie."
    tags: ["Gestion de projet", "Entrepreneuriat", "Web", "Trésorerie"]
    demo: "https://eclair-cie.super.site"
    details:
      - type: text
        content: "J'ai accompagné des élèves en bac professionnel dans la création et la gestion d'une micro-entreprise, en partenariat avec leur lycée et une association locale. Mon rôle était de les guider sur les aspects entrepreneuriaux et techniques du projet."
      - type: text
        content: "Les livrables incluaient la réalisation d'un catalogue produit, la création d'un site web vitrine, et l'organisation complète de la production et de la vente. J'ai également géré la trésorerie de la structure pour assurer sa viabilité financière."
      - type: text
        content: "L'objectif final — financer un voyage scolaire grâce aux bénéfices générés — a été atteint, offrant aux élèves une expérience concrète de l'entrepreneuriat."

