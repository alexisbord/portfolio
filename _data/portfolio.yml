experience:
  - title: "Stage Data Scientist – Vision industrielle & Deep Learning"
    company: "Arc"
    logo: "/assets/img/arc.png"
    period: "Avril — Août 2024"
    description: "▸ Conduite d'une étude de faisabilité pour l'intégration de l'IA sur une ligne de production afin d'améliorer le contrôle qualité \n▸ Développement et évaluation de modèles d'IA (supervisés/non supervisés) sur des images acquises par ordinateur industriel \n▸ Étude comparative de solutions d'industrialisation de fournisseurs pour choisir celle la plus adaptée aux contraintes de production"
    result: "Approbation du projet par la direction, déclenchant l'acquisition en location d'une unité pilote pour des tests réelssur ligne de production"
    tags: ["Python", "Deep Learning", "Computer Vision"]
    details:
      - type: text
        content: "Arc est le huitième plus grand site industriel français et un leader mondial des arts de la table, engagé dans le développement et la fabrication de produits en verre, dont le verre coloré teinté dans la masse. Au sein de ce groupe industriel, j’ai mené une étude de faisabilité visant à intégrer une solution d’intelligence artificielle pour le contrôle qualité de nouvelles gammes en verre opale coloré, qui nécessite un manuel puisque les machines actuelles ne sont pas suffisantes. "
      - type: text
        content: "J’ai assuré la collecte et la structuration des données sur un banc d’essai industriel que j’ai mis en place, en optimisant les paramètres d’acquisition (luminosité, réglages caméras) afin de constituer un jeu de données exploitable pour l’entraînement et l’évaluation des modèles. J’ai d’abord validé la performance d’une approche par réseaux de neurones convolutifs (CNN) en apprentissage supervisé, en démontrant des résultats au moins équivalents aux systèmes de vision classiques."
      - type: images
        items:
          - src: "assets/img/banc.png"
            caption: "Banc de test"
      - type: text 
        content: "Face à la diversité croissante des articles et des défauts, j’ai ensuite orienté le projet vers une approche non supervisée basée sur des auto-encodeurs afin de développer un système de détection d’anomalies plus flexible et généralisable, permettant de démontrer la pertinence de la solution et d’obtenir la validation de la direction."
      - type: images
        items:
          - src: "assets/img/autoencodeur.png"
            caption: "Classification non supervisée par auto-encodeur pour la détection des défauts"
      - type: text
        content: "En parallèle, j’ai mené une prospection auprès de différents fournisseurs afin de comparer les solutions d’industrialisation les plus adaptées aux contraintes des lignes de production et d’identifier l’architecture technique la plus pertinente, ce qui a conduit au choix d’une solution pilote déployée pour des tests en conditions réelles."
      - type: images
        items:
          - src: "assets/img/industrialisation.png"
            caption: "Solution d'industrialisation de l'entreprise retenue"
  - title: "Stage Data Analyst"
    company: "Vinci – Cegelec Projets Espace & Hydrogène"
    logo: "/assets/img/cegelec.png"
    period: "Mai — Août 2023"
    description: "▸ Réalisation d'un POC sur la solution SaaS Teepee pour l'automatisation de processus métiers : \n▸ Développement d’un tableau de bord de suivi des candidats, facilitant la visibilité sur le processus de recrutement \n▸ Création d’un outil de suivi en temps réel des expéditions vers la Guyane, garantissant la traçabilité complète du matériel"
    result: "Automatisation réussie des processus cibles, marquée par le test de l'outil de recrutement en conditions réelles par l'équipe RH"
    tags: ["SQL", "Excel", "SaaS"]
    details:
      - type: text
        content: "Au sein de Cegelec Projets Espace & Hydrogène, j'ai accompagné l'acquisition de la licence SaaS Teepee en pilotant un POC visant à tester le déploiement et à identifier les limites techniques de la solution pour l'automatisation des processus métiers."
      - type: text
        content: "J'ai d'abord répondu à la complexité du suivi des candidatures, avec un processus qui implique des validations croisées entre les RH, la Direction Technique et les opérationnels, en développant un tableau de bord centralisé pour avoir un résumé global clair garantissant la conformité RGPD."
      - type: text
        content: "Concernant la logistique, j'ai évalué la faisabilité technique du remplacement d'une base Microsoft Access obsolète par un outil de suivi des expéditions vers la Guyane, testant ainsi les limites de la solution SaaS pour assurer une traçabilité complète."
      - type: text
        content: "Cette mission a permis de confirmer la viabilité de l'automatisation, aboutissant à une configuration RH prête pour un test en conditions réelles et à une analyse précise des contraintes de migration pour les flux logistiques."
