experience:
  - title: "Stage Data Scientist – Vision industrielle & Deep Learning"
    company: "Arc"
    logo: "/assets/img/arc.png"
    period: "Avril — Août 2024"
    description: "▸ Étude de faisabilité pour automatiser le contrôle qualité d'une ligne à 100 000 articles/jour, représentant un surcoût de 300k€/an \n▸ Entraînement et évaluation de modèles supervisés et non supervisés sur 5 000 images acquises via un ordinateur industriel \n▸ Benchmark de 5 solutions d'industrialisation pour identifier la plus adaptée aux contraintes de production"
    result: "Approbation du projet par la direction, déclenchant l'acquisition en location d'une unité pilote pour des tests réelssur ligne de production"
    tags: ["Python", "Deep Learning", "Computer Vision"]
    details:
      - type: text
        content: "Arc est le huitième plus grand site industriel français et un leader mondial des arts de la table. Au sein de ce groupe, j'ai mené une étude de faisabilité visant à intégrer une solution d'IA pour le contrôle qualité d'une ligne produisant 100 000 articles par jour, un processus alors entièrement manuel générant un surcoût opérationnel estimé à 300k€/an."
      - type: text
        content: "J'ai constitué un dataset de 5 000 images sur un banc d'essai industriel que j'ai mis en place, en optimisant les paramètres d'acquisition (luminosité, réglages caméras). J'ai validé la performance d'une approche CNN en apprentissage supervisé, démontrant des résultats équivalents aux systèmes de vision classiques."
      - type: images
        items:
          - src: "assets/img/banc.png"
            caption: "Banc de test mis en place pour la collecte des données"
      - type: text
        content: "Face à la diversité croissante des défauts, j'ai orienté le projet vers une approche non supervisée par auto-encodeurs, plus flexible et généralisable, permettant d'obtenir la validation de la direction sans nécessiter de renouvellement du dataset à chaque nouvelle gamme."
      - type: images
        items:
          - src: "assets/img/autoencodeur.png"
            caption: "Classification non supervisée par auto-encodeur pour la détection des défauts"
      - type: text
        content: "En parallèle, j'ai comparé 5 solutions d'industrialisation fournisseurs sur des critères techniques et économiques, ce qui a conduit au choix d'une unité pilote déployée pour des tests en conditions réelles sur la ligne de production."
      - type: images
        items:
          - src: "assets/img/industrialisation.png"
            caption: "Solution d'industrialisation de l'entreprise retenue"

  - title: "Stage Data Analyst et Automatisation"
    company: "Vinci – Cegelec Projets Espace & Hydrogène"
    logo: "/assets/img/cegelec.png"
    period: "Mai — Août 2023"
    description: "▸ POC sur la solution SaaS Teepee ciblant l'automatisation de 2 processus métiers clés \n▸ Tableau de bord de recrutement générant 4 documents automatiquement et centralisant les validations multi-équipes \n▸ Outil de suivi logistique en 5 étapes pour les expéditions vers la Guyane, en remplacement d'une base Access obsolète"
    result: "Automatisation réussie des processus cibles, marquée par le test de l'outil de recrutement en conditions réelles par l'équipe RH"
    tags: ["SQL", "Excel", "SaaS"]
    details:
      - type: text
        content: "Au sein de Cegelec Projets Espace & Hydrogène, j'ai piloté un POC sur la solution SaaS Teepee pour tester son déploiement sur 2 processus métiers distincts et identifier les limites techniques de la solution."
      - type: text
        content: "Pour le processus de recrutement, j'ai développé un tableau de bord centralisé gérant les validations croisées entre RH, Direction Technique et opérationnels. L'outil génère automatiquement 4 documents clés, garantissant la conformité RGPD et réduisant significativement le temps de traitement des candidatures."
      - type: text
        content: "Pour la logistique, j'ai structuré un outil de suivi des expéditions vers la Guyane en 5 étapes clés (importation SAP, cadencement, réception, stockage et sortie), en remplacement d'une base Microsoft Access obsolète, assurant une traçabilité complète du matériel expédié."
      - type: text
        content: "Cette mission a confirmé la viabilité de l'automatisation des 2 processus cibles, aboutissant à une configuration RH testée en conditions réelles par l'équipe et à une analyse précise des contraintes de migration logistique."
