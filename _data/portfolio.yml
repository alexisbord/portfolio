    result: "Automatisation réussie des processus cibles, marquée par le test de l'outil de recrutement en conditions réelles par l'équipe RH"
    tags: ["SQL", "Excel", "SaaS"]
    details:
      - type: text
        content: "Au sein de Vinci Cegelec à Puteaux, j'ai réalisé un POC sur la solution SaaS Teepee afin d'automatiser deux processus métiers clés pour l'équipe."
      - type: text
        content: "Premier livrable : un tableau de bord de suivi des candidats, facilitant la visibilité sur l'ensemble du processus de recrutement et permettant aux managers de suivre les candidatures en temps réel."
      - type: text
        content: "Second livrable : un outil de suivi en temps réel des expéditions de matériel vers la Guyane, garantissant une traçabilité complète et réduisant les pertes d'information entre les équipes logistiques."
