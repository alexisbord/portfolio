projects:
  - name: "Datathon UdeM — Planificateur de repas intelligent"
    context: "Ce projet a été réalisé lors du Datathon de l'Université de Montréal en groupe de 3, qui nous a permis de remporter le prix de la meilleure utilisation de l'IA."
    tags: ["Python", "Streamlit", "SQLite", "API"]
    github: "https://github.com/alexisbord/UdeM_Hack"
    blocks:
      - type: text
        content: "NutriSnap permet de scanner le contenu d'un réfrigérateur pour générer instantanément des suggestions de recettes saines. Le système calcule le Nutri-Score et les apports nutritionnels (protéines, sucres, graisses) de chaque plat pour aider l'utilisateur à maintenir une alimentation équilibrée selon ses objectifs personnels."
      - type: text
        content: "Côté technique, nous avons fine-tuné YOLOv11 sur une base de 30 ingrédients courants pour surpasser les limitations des modèles de zero-shot comme CLIP. Les données sont centralisées dans une base SQLite, permettant de croiser les apports caloriques avec les dépenses sportives récupérées via l'API Garmin. Le projet intègre également un chatbot agissant comme un coach de santé. En exploitant l'API OpenAI et les données physiologiques de l'utilisateur (poids, âge, activité physique), l'IA génère des programmes d'entraînement et des conseils nutritionnels sur mesure pour soutenir la motivation à long terme."
      - type: layout3
        cols:
          - src: "/assets/img/fridge.jpg"
            caption: "Détection d'ingrédients par YOLOv11"
          - src: "/assets/img/recipe.jpg"
            caption: "Interface de recommandation de recettes et Nutri-Score"
        stack:
          - src: "/assets/img/assistant.jpg"
            caption: "Assistant IA personnalisé pour le suivi santé"
          - src: "/assets/img/winner.jpg"
            caption: "Vainqueurs du prix de la meilleure utilisation de l'IA"        

  - name: "Annotation automatique de données de pollution"
    context: "Ce projet de recherche académique a été mené pour le Groupe Tera en collaboration avec une doctorante de l’IMT Nord Europe, dans le but d’analyser la corrélation entre le trafic urbain et les pics de pollution atmosphérique."
    tags: ["Python", "Raspberry Pi", "API Web"]
    blocks:
      - type: text
        content: "L’objectif du projet était de concevoir un système de vision par ordinateur embarqué sur Raspberry Pi, capable de labelliser automatiquement le flux routier afin d’expliquer certaines anomalies observées dans les mesures de particules fines PM2.5."
      - type: text
        content: "Afin de répondre aux contraintes de stockage et de réactivité des caméras embarquées, le logiciel Motion a été implémenté sur Raspberry Pi. Cette solution permettait de déclencher l’enregistrement vidéo uniquement en cas de détection de mouvement et a servi de base à la constitution d’un jeu de données visuelles synchronisé avec les relevés des micro-capteurs de pollution."
      - type: images
        items:
          - src: "/assets/img/materiel.png"
            caption: "Cartes Raspberry Pi 3 Model B+ et webcams utilisées pour l’acquisition de données sur le terrain"
          - src: "/assets/img/setup.png"
            caption: "Dispositif expérimental mis en place pour comparer les mesures issues des capteurs Tera et CozyConnect"
          - src: "/assets/img/cars.png"
            caption: "Pipeline de détection reposant sur YOLOv7 et suivi d’identité assuré par DeepSORT"
      - type: text
        content: "Un algorithme d’annotation automatique fondé sur des critères cinématiques, tels que la vitesse et l’accélération, a été développé afin de classifier les véhicules comme étant en mouvement ou à l’arrêt. Cette couche logique a permis de corriger certaines erreurs inhérentes au tracking, notamment lors d’occlusions ou de faux appariements et de générer des labels précis pour chaque image."
      - type: text
        content: "La phase finale du projet a consisté à fusionner les annotations issues de la vision par ordinateur avec les données de concentration en PM2.5 récupérées via les API Web de Tera et CozyConnect. L’application de filtres médians et de fenêtres temporelles a permis d’analyser la relation entre le passage des véhicules et la persistance des polluants dans l’air."
      - type: text
        content: "Les travaux ont permis de valider une méthodologie de fusion de données multi-sources, avec un retour positif des encadrants concernant la pertinence de l’analyse cinématique proposée."

  - name: "Dashboard personnel d'activité des données Garmin"
    context: "Il s'agit d'un projet personnel de data engineering et de visualisation interactive basé sur les exports SQLite de Garmin."
    tags: ["Python", "Flask", "D3.js", "SQLite"]
    github: "https://github.com/alexisbord/Dataviz_Garmin"
    blocks:
      - type: text
        content: "L'objectif est de transformer plusieurs années de données personnelles Garmin (activités, sommeil, fréquence cardiaque) en visualisations interactives exploitables, différentes de celles proposées par Garmin. Le projet repose sur une architecture full-stack claire : une API REST Flask interroge les bases SQLite exportées depuis Garmin Connect et un client html/css + D3 se charge de l'affichage."
      - type: images
        items:
          - src: "/assets/img/cumulative_dist.png"
            caption: "Distance cumulée de course à pied sur plusieurs années"
          - src: "/assets/img/beeswarm.png"
            caption: "Distribution annuelle des activités sportives"
      - type: text
        content: "Côté backend, j'ai conçu des endpoints RESTful exposant les données d'activité structurées, avec une configuration par variables d'environnement pour un déploiement flexible. Côté frontend, les visualisations D3 intègrent un scaling dynamique et des interactions hover pour explorer les métriques dans le temps."

  - name: "Création de la micro-entreprise Eclair-CIE"
    context: "Ce projet entrepreneurial et social a été mené en partenariat avec un lycée professionnel et une association afin d'initier des élèves de bac professionnel aux réalités du monde de l'entreprise."
    tags: ["Gestion de projet", "Impression 3D"]
    demo: "https://eclair-cie.super.site"
    blocks:
      - type: text
        content: "L’objectif consistait à accompagner une classe dans la création complète d’une micro‑entreprise, depuis la conception des produits jusqu’à la gestion financière, afin de financer une sortie scolaire. L’accompagnement portait sur l’ensemble des étapes clés de la création de valeur, de l’étude de marché initiale à la construction d’un catalogue produit cohérent, tout en initiant les élèves aux principes de la gestion de projet agile."
      - type: images
        items:
          - src: "/assets/img/d3.png"
            caption: "Système d'impression 3D mis en place pour la fabrication des produits"
          - src: "/assets/img/eolienne.png"
            caption: "Exemple d'un produit conçu et fabriqué pour la vente : une éolienne miniature fonctionnelle imprimée en 3D"
          - src: "/assets/img/carte.png"
            caption: "Protoype de carte multifonctionnelle produite par les élèves"
      - type: text
        content: "J'ai assuré la gestion numérique par la création d'un site web vitrine et le suivi rigoureux de la trésorerie de la structure. Cette double approche, technique et administrative, a permis de transformer une initiative pédagogique en une réussite commerciale concrète, offrant aux élèves une immersion gratifiante dans l'entrepreneuriat moderne."
      - type: text
        content: "La structure est devenue pleinement opérationnelle et a généré les premieres bénéfices nécessaires au financement du projet pédagogique, validant ainsi l'acquisition de compétences concrètes par les élèves et la continuation future."


