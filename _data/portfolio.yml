    description: "Conception et développement d'applications web scalables. Leadership technique d'une équipe de 5 développeurs. Migration vers une architecture microservices."
    tags: ["React", "Node.js", "PostgreSQL", "Docker"]
    images:
      - src: "https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=700&q=80"
        alt: "Équipe de développement"
      - src: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=700&q=80"
