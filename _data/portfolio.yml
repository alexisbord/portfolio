projects:
  - name: "Projet #1 — DevFlow"
    context: "Dans le cadre de mon master à l'Université Paris Saclay, j'ai développé une plateforme de gestion de projets agiles pour répondre aux besoins des équipes distribuées."
    objective: "Concevoir et implémenter une application web temps réel permettant la collaboration synchrone entre équipes, avec gestion des sprints, tableaux Kanban et métriques de vélocité."
    result: "L'application a été adoptée par 3 équipes internes, avec une réduction mesurée de 30% du temps de coordination lors des cérémonies agiles."
    tags: ["React", "Socket.io", "Node.js", "MongoDB"]
    github: "#"
    demo: "#"
    images:
      - src: "https://images.unsplash.com/photo-1551650975-87deedd944c3?w=700&q=80"
        alt: "Interface principale DevFlow"
      - src: "https://images.unsplash.com/photo-1507925921958-8a62f3d1a50d?w=700&q=80"
        alt: "Tableau Kanban en temps réel"
    details:
      - type: text
        content: "DevFlow est né d'un constat simple : les outils de gestion de projet existants sont soit trop lourds, soit trop limités pour les petites équipes agiles. L'objectif était de créer un outil minimaliste mais puissant."
      - type: images
        items:
          - src: "https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=900&q=80"
            alt: "Tableau Kanban DevFlow"
            caption: "Vue Kanban avec drag & drop"
          - src: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=900&q=80"
            alt: "Dashboard métriques"
            caption: "Dashboard de vélocité d'équipe"
      - type: text
        content: "L'architecture repose sur React + Redux côté client et Node.js + Socket.io côté serveur pour la synchronisation temps réel. La grande difficulté technique a été la gestion des conflits lors d'éditions simultanées, résolue via un système de verrous optimistes."
      - type: images
        items:
          - src: "https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=900&q=80"
            alt: "Code source DevFlow"
            caption: "Extrait du code backend"

  - name: "Projet #2 — WeatherScope"
    context: "Application météo PWA développée en autonomie pour explorer les possibilités des Progressive Web Apps et des APIs de données environnementales."
    objective: "Fournir des prévisions hyper-locales avec visualisation de données interactives, support offline complet et notifications push pour les alertes météo sévères."
    result: "500+ utilisateurs actifs, score Lighthouse 97/100, sélectionnée comme exemple de bonnes pratiques PWA dans un article Medium."
    tags: ["Vue.js", "D3.js", "OpenWeather API", "PWA"]
    github: "#"
    demo: "#"
    images:
      - src: "https://images.unsplash.com/photo-1504608524841-42584120d693?w=700&q=80"
        alt: "Visualisation météo interactive"
      - src: "https://images.unsplash.com/photo-1561484930-998b6a7b22e8?w=700&q=80"
        alt: "Dashboard mobile WeatherScope"
    details:
      - type: text
        content: "WeatherScope est parti d'une frustration personnelle : les applications météo existantes affichent trop d'informations inutiles. J'ai voulu créer une interface épurée centrée sur l'essentiel."
      - type: images
        items:
          - src: "https://images.unsplash.com/photo-1504608524841-42584120d693?w=900&q=80"
            alt: "Interface WeatherScope"
            caption: "Vue principale avec prévisions 7 jours"
          - src: "https://images.unsplash.com/photo-1561484930-998b6a7b22e8?w=900&q=80"
            alt: "Visualisations D3.js"
            caption: "Graphiques de précipitations en D3.js"
      - type: text
        content: "Les visualisations D3.js ont été la partie la plus technique. J'ai développé des graphiques animés pour les courbes de température et les roses des vents, optimisés pour fonctionner parfaitement sur mobile."

  - name: "Projet #3 — CLI DevTools"
    context: "Suite d'outils open source créée pour automatiser les tâches répétitives du workflow développeur, initialement pour un usage personnel puis partagée sur GitHub."
    objective: "Proposer un ensemble d'utilitaires CLI modulaires couvrant la génération de boilerplate, la gestion de secrets, le scaffolding de projets et les helpers Git."
    result: "1 200+ étoiles sur GitHub, 40+ contributeurs externes, packagé sur PyPI avec 8 000+ téléchargements mensuels."
    tags: ["Python", "Click", "Rich", "Docker"]
    github: "#"
    demo: "#"
    images:
      - src: "https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=700&q=80"
        alt: "Terminal CLI DevTools"
    details:
      - type: text
        content: "CLI DevTools a commencé comme une collection de scripts bash personnels avant d'évoluer en une suite Python structurée. La réécriture avec Click a permis d'ajouter une documentation automatique et une gestion des erreurs robuste."
      - type: images
        items:
          - src: "https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=900&q=80"
            alt: "CLI en action"
            caption: "Interface Rich avec couleurs et progress bars"
      - type: text
        content: "Le projet a pris une dimension inattendue après un post sur Reddit. En une semaine, le repo est passé de 12 à 800 étoiles. Gérer cette communauté soudaine a été une expérience très formatrice sur la gestion open source."

