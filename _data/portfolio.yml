    details:
      - type: text
        content: "En rejoignant TechCorp Paris en 2022, j'ai pris la tête technique d'une équipe de 5 développeurs pour refondre l'infrastructure backend de l'application principale, qui supportait alors 50 000 utilisateurs actifs."
      - type: text
        content: "Le projet phare a été la migration d'une architecture monolithique vers des microservices Docker orchestrés via Kubernetes. Cette transition a réduit le temps de déploiement de 45 minutes à moins de 3 minutes, et amélioré la disponibilité de 97,2% à 99,8%."
      - type: images
        items:
          - src: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=900&q=80"
            alt: "Réunion d'équipe technique"
            caption: "Sprint planning hebdomadaire"
          - src: "https://images.unsplash.com/photo-1605379399642-870262d3d051?w=900&q=80"
            alt: "Architecture microservices"
            caption: "Schéma d'architecture cible"
      - type: text
        content: "J'ai également introduit des pratiques de code review systématiques et une pipeline CI/CD complète avec tests automatisés, réduisant le taux de bugs en production de 60%."

