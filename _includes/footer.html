<footer class="footer" id="contact">
  <div class="col-center">
    <div class="footer__content">
      <div class="footer__main">
        <h2 class="footer__title">Travaillons ensemble.</h2>
        <p class="footer__sub">Ouvert aux opportunités freelance & CDI</p>
        <a href="mailto:{{ site.email }}" class="footer__email">{{ site.email }}</a>
      </div>
      <div class="footer__links">
        {% if site.github %}
        <a href="https://github.com/{{ site.github }}" target="_blank" rel="noopener" aria-label="GitHub">
          <i class="fab fa-github"></i>
        </a>
        {% endif %}
        {% if site.linkedin %}
        <a href="https://linkedin.com/in/{{ site.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
          <i class="fab fa-linkedin-in"></i>
        </a>
        {% endif %}
        {% if site.twitter %}
        <a href="https://twitter.com/{{ site.twitter }}" target="_blank" rel="noopener" aria-label="Twitter">
          <i class="fab fa-x-twitter"></i>
        </a>
        {% endif %}
      </div>
    </div>
    <div class="footer__bottom">
      <p>© {{ 'now' | date: "%Y" }} {{ site.title }}. Construit avec Jekyll &amp; ❤️</p>
    </div>
  </div>
</footer>
